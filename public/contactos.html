<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contactos - Mi Sitio Web</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --white:#fff;
    --off:#f8f8f8;
    --gray:#c8c8c8;
    --dark:#1a1a1a;
    --black:#0a0a0a;
}

body{
    font-family:'DM Sans',sans-serif;
    background:var(--off);
}

/* NAV */
.navbar{
    background:var(--black)!important;
    border-bottom:2px solid white;
}
.nav-link{
    color:var(--gray)!important;
    text-transform:uppercase;
    font-size:.8rem;
}
.nav-link.active,.nav-link:hover{color:white!important}

/* HERO */
.hero{
    background:var(--black);
    padding:5rem 0;
}
.hero h1{
    font-family:'Playfair Display',serif;
    color:white;
    font-size:4rem;
}
.hero p{color:rgba(255,255,255,.4)}

/* CARDS */
.contact-card{
    background:white;
    padding:2rem;
    border:1px solid #eee;
    transition:.3s;
}
.contact-card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 40px rgba(0,0,0,.1);
}

/* FORM */
.form-box{
    background:white;
    padding:2.5rem;
    border:1px solid #eee;
}

/* BUTTON */
.btn-custom{
    background:black;
    color:white;
    padding:.7rem 2rem;
    text-transform:uppercase;
    font-size:.8rem;
}
.btn-custom:hover{background:#333}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">
<a class="navbar-brand text-white" href="../index.html">Mi Sitio Web</a>
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
<li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
<li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
<li class="nav-item"><a class="nav-link active" href="#">Contactos</a></li>
</ul>
</div>
</nav>

<!-- HERO -->
<section class="hero text-center">
<div class="container">
<h1>Contactos</h1>
<p>Estamos listos para ayudarte en lo que necesites</p>
</div>
</section>

<main class="py-5">
<div class="container">

<!-- CONTACT CARDS -->
<div class="row g-4 mb-5">

<div class="col-md-4">
<div class="contact-card text-center">
<h5>📞 Teléfono</h5>
<p>+57 300 000 0000</p>
</div>
</div>

<div class="col-md-4">
<div class="contact-card text-center">
<h5>✉️ Email</h5>
<p>contacto@josemiguel.com</p>
</div>
</div>

<div class="col-md-4">
<div class="contact-card text-center">
<h5>📍 Ubicación</h5>
<p>Bogotá, Colombia</p>
</div>
</div>

</div>

<!-- FORM -->
<div class="form-box">
<h3 class="mb-4">Envíanos un mensaje</h3>

<form>
<div class="row g-3">
<div class="col-md-6">
<input class="form-control" placeholder="Nombre">
</div>
<div class="col-md-6">
<input class="form-control" placeholder="Correo">
</div>
<div class="col-12">
<input class="form-control" placeholder="Asunto">
</div>
<div class="col-12">
<textarea class="form-control" rows="5" placeholder="Mensaje"></textarea>
</div>
<div class="col-12">
<button class="btn-custom">Enviar</button>
</div>
</div>
</form>

</div>

</div>
</main>

<!-- FOOTER -->
<footer class="text-center py-4" style="background:black;color:#888">
<p>&copy; 2026 Mi Sitio Web</p>
</footer>

</body>
</html>
